<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Uamme</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>📡 Uamme</h1>
      <p class="subtitle">登录管理后台</p>

      <div class="login-error" id="error-msg"></div>

      <form id="login-form">
        <div class="md-field">
          <label>用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="md-field">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="md-btn md-btn-filled" style="width:100%;height:48px;margin-top:8px;" id="login-btn">
          登录
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;">
        <a href="/" class="md-btn md-btn-text md-btn-sm">← 返回首页</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (localStorage.getItem('uamme_token')) {
      window.location.href = '/app.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errDiv = document.getElementById('error-msg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = '登录中...';
      errDiv.style.display = 'none';

      try {
        const data = await API.login(username, password);
        if (data.error) {
          errDiv.textContent = data.error;
          errDiv.style.display = 'block';
        } else {
          window.location.href = '/app.html';
        }
      } catch (err) {
        errDiv.textContent = '网络错误，请重试';
        errDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
